# Environment Variables for Hyprland
# NVIDIA-specific Wayland environment setup
#
# NOTE: These environment variables are also defined in nix/modules/desktop/hyprland.nix
# via environment.variables (system-wide). This file provides redundancy and may be
# needed during Hyprland startup before system env vars are loaded.
# Keep in sync with nix/modules/desktop/hyprland.nix lines 49-85.

# Wayland backend
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland

# NVIDIA GPU settings
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# Wayland-specific fixes
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1

# Input method
env = XMODIFIERS,@im=ibus
env = GTK_IM_MODULE,ibus
env = QT_IM_MODULE,ibus

# Qt settings
env = QT_QPA_PLATFORMTHEME,gtk
env = QT_SCALE_FACTOR,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# X11 fallback
env = QT_QPA_PLATFORM,wayland;xcb

# Java
env = _JAVA_AWT_WM_NONREPARENTING,1

# Desktop environment
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Portal settings
env = GTK_USE_PORTAL,1
env = NIXOS_XDG_OPEN_USE_PORTAL,1

# Default applications
env = BROWSER,firefox.desktop
env = TERMINAL,alacritty

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

# Misc
env = NIXOS_OZONE_WL,1
env = GDK_SCALE,1
