# Window Rules
# Application-specific window behavior and styling

# ==================== Floating Windows ====================

# Dialogs and floating apps
windowrule = float,title:^(Open File)(.*)$
windowrule = float,title:^(Save As)(.*)$
windowrule = float,title:^(About)(.*)$
windowrule = float,title:^(Settings)(.*)$
windowrule = float,title:^(Preferences)(.*)$
windowrule = float,class:^(pavucontrol)$
windowrule = float,class:^(nm-connection-editor)$
windowrule = float,class:^(wdisplays)$
windowrule = float,class:^(nwg-look)$
windowrule = float,class:^(zenity)$
windowrule = float,class:^(file_progress)$
windowrule = float,class:^(confirm)$
windowrule = float,class:^(dialog)$
windowrule = float,class:^(Nautilus)$

# ==================== Opacity ====================

# Transparent windows
windowrule = opacity 0.9 0.8,class:^(alacritty)$
windowrule = opacity 1.0,class:^(firefox)$
windowrule = opacity 1.0,class:^(discord)$

# ==================== Size and Position ====================

# Terminal windows
windowrule = size 60% 60%,title:^(alacritty)$
windowrule = center,title:^(alacritty)$

# ==================== Ignore Rules ====================

# Don't apply borders
windowrulev2 = noborder,class:^(fullscreen)(.*)$

# ==================== Specific Applications ====================

# Discord
windowrule = workspace 1, class:^(discord)$

# Firefox
windowrule = workspace 1, class:^(firefox)$

# VS Code
windowrule = workspace 2, class:^(code)$

# Obsidian
windowrule = workspace 4, class:^(obsidian)$

# Slack
windowrule = workspace 5, class:^(slack)$

# ==================== Layer Rules ====================

# Notifications
layerrule = noanim,notifications

# Screensaver
layerrule = noanim,screensaver
