# Window Rules (Hyprland 0.53+ syntax)
# Application-specific window behavior and styling

# ==================== Floating Windows ====================

# Dialogs and floating apps
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$
windowrulev2 = float, title:^(About)(.*)$
windowrulev2 = float, title:^(Settings)(.*)$
windowrulev2 = float, title:^(Preferences)(.*)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(wdisplays)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(zenity)$
windowrulev2 = float, class:^(file_progress)$
windowrulev2 = float, class:^(confirm)$
windowrulev2 = float, class:^(dialog)$
windowrulev2 = float, class:^(Nautilus)$

# ==================== Opacity ====================

# Transparent windows
windowrulev2 = opacity 0.9 0.8, class:^(alacritty)$
windowrulev2 = opacity 1.0, class:^(firefox)$
windowrulev2 = opacity 1.0, class:^(discord)$

# ==================== Size and Position ====================

# Terminal windows
windowrulev2 = size 60% 60%, title:^(alacritty)$
windowrulev2 = center, title:^(alacritty)$

# ==================== Suppress Events ====================

# Ignore maximize requests from all apps
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
