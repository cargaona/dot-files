# Window Rules (Hyprland 0.53+ block syntax)
# Application-specific window behavior and styling

# ==================== Floating Dialogs ====================

windowrule {
    name = float-file-dialogs
    match:title = ^(Open File)(.*)$
    float = true
}

windowrule {
    name = float-save-dialogs
    match:title = ^(Save As)(.*)$
    float = true
}

windowrule {
    name = float-about-dialogs
    match:title = ^(About)(.*)$
    float = true
}

windowrule {
    name = float-settings-dialogs
    match:title = ^(Settings)(.*)$
    float = true
}

windowrule {
    name = float-preferences-dialogs
    match:title = ^(Preferences)(.*)$
    float = true
}

# ==================== Floating Apps ====================

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
}

windowrule {
    name = float-nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float = true
}

windowrule {
    name = float-wdisplays
    match:class = ^(wdisplays)$
    float = true
}

windowrule {
    name = float-nwg-look
    match:class = ^(nwg-look)$
    float = true
}

windowrule {
    name = float-zenity
    match:class = ^(zenity)$
    float = true
}

windowrule {
    name = float-file-progress
    match:class = ^(file_progress)$
    float = true
}

windowrule {
    name = float-confirm
    match:class = ^(confirm)$
    float = true
}

windowrule {
    name = float-dialog
    match:class = ^(dialog)$
    float = true
}

windowrule {
    name = float-nautilus
    match:class = ^(Nautilus)$
    float = true
}

# ==================== Application Styling ====================

windowrule {
    name = alacritty-style
    match:class = ^(alacritty)$
    opacity = 0.9 0.8
}

windowrule {
    name = firefox-opacity
    match:class = ^(firefox)$
    opacity = 1.0
}

windowrule {
    name = discord-opacity
    match:class = ^(discord)$
    opacity = 1.0
}

# ==================== Suppress Events ====================

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
