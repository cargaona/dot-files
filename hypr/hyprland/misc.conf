# Miscellaneous Settings (Hyprland 0.53+ syntax)
# Various Hyprland configuration options

misc {
    # Resize animations
    animate_manual_resizes = true

    # Focus policy
    focus_on_activate = true

    # Close special workspace when last window removed
    close_special_on_empty = true

    # Auto-reload config on change
    disable_autoreload = false

    # Mouse movement focuses monitor
    mouse_move_focuses_monitor = true

    # Drag-and-drop follows focus
    always_follow_on_dnd = true

    # Variable refresh rate (0=off, 1=on, 2=fullscreen only)
    vrr = 2

    # Hyprland branding
    disable_hyprland_logo = false
    disable_splash_rendering = false
    force_default_wallpaper = -1

    # Initial workspace tracking
    initial_workspace_tracking = 0
}
