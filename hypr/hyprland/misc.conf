# Miscellaneous Settings
# Various Hyprland configuration options

misc {
    # Disable animations when laptop is on battery
    animate_manual_resizes = true
    animate_mouse_windowdrag = true

    # Focus policy
    focus_on_activate = true

    # Close window on middle-click on titlebar
    close_special_on_empty = true

    # Disable feedback while dragging
    disable_autoreload = false

    # Window hover effect
    mouse_move_focuses_monitor = true

    # Special workspace behavior
    always_follow_on_dnd = true

    # Render settings
    render_ahead_of_time = false
    render_titles_in_multihead = false

    # No border on fullscreen
    no_border_on_fullscreen = false

    # Variable refresh rate
    vrr = 2

    # Damage tracking
    damage_entire_on_snapshot = false

    # Layer rule validation
    disable_hyprland_logo = false
    disable_splash_rendering = false

    # Workspace centering
    force_default_wallpaper = -1

    # Initial workspace
    initial_workspace_tracking = 0
}
