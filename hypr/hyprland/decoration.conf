# Decoration Settings
# Window borders, rounding, blur, shadows, and visual effects

decoration {
    # Rounding corners
    rounding = 10

    # Blur effect
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }

    # Drop shadow (Hyprland 0.53+ syntax)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1e1e2e99)
    }
}

# Note: layerrule blur handled by caelestia-shell
