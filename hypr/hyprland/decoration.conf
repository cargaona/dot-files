# Decoration Settings
# Window borders, rounding, blur, shadows, and visual effects

decoration {
    # Rounding corners
    rounding = 10

    # Blur effect
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }

    # Drop shadow
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1e1e2e99)
}

# Blur for specific window classes
layerrule = blur, gtk-layer-shell
layerrule = blur, notifications
