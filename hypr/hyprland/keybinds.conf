# Keybind Configuration
# Vim-style navigation with caelestia-shell IPC integration

# Modifier keys
$mod = SUPER

# ==================== Window Focus & Movement (Vim hjkl) ====================

# Focus windows (Super + hjkl)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Move windows (Super + Shift + hjkl)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Resize mode: use Super+R to enter, hjkl to resize, Escape to exit
# (see Resize Mode submap section at end of file)

# ==================== Workspace Navigation ====================

# Switch to workspace (Super + 1-9, 0)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace (Super + Shift + 1-9, 0)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mod, minus, togglespecialworkspace
bind = $mod SHIFT, minus, movetoworkspace, special

# ==================== Caelestia Shell IPC ====================

# Launcher (Alt + Space)
bind = ALT, space, global, caelestia:launcher

# Screenshot (region)
bind = $mod SHIFT, s, global, caelestia:screenshotFreeze

# Screenshot (fullscreen)
bindl = , Print, exec, caelestia screenshot

# Lock screen
bind = $mod SHIFT, q, global, caelestia:lock

# Session menu (logout/shutdown/reboot)
bind = CTRL ALT, Delete, global, caelestia:session

# Notifications sidebar (if caelestia supports it)
bind = $mod, n, global, caelestia:drawer:toggle:sidebar

# ==================== Window Management ====================

# Fullscreen (Super + F)
bind = $mod, f, fullscreen

# Floating toggle (Super + Space)
bind = $mod, space, togglefloating

# Pin window (Super + P)
bind = $mod, p, pin

# Swap layouts (Super + E)
bind = $mod, e, layoutmsg, togglesplit

# Master/Slave toggle (Super + M)
bind = $mod, m, layoutmsg, swapwithmaster

# Add to master (Super + D)
bind = $mod, d, layoutmsg, addmaster

# Remove from master (Super + Shift + D) - opposite of Super + D (addmaster)
bind = $mod SHIFT, d, layoutmsg, removemaster

# ==================== System Controls ====================

# Reload Hyprland config (Super + Shift + R)
bind = $mod SHIFT, w, forcerendererreload

# Kill focused window (Super + Q)
bind = $mod, q, killactive

# Exit Hyprland (Super + Shift + E) - requires confirmation
bind = $mod SHIFT, e, exec, echo "Use Ctrl+Alt+Delete for session menu"

# Volume (if not handled by caelestia)
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ==================== Mouse Binds ====================

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ==================== Resize Mode (Submap) ====================
# Press Super+R to enter resize mode, hjkl to resize, Escape to exit

# Enter resize mode
bind = $mod, r, submap, resize

# Resize submap keybinds
submap = resize

# Visual feedback: change border color to indicate resize mode
exec = hyprctl keyword general:col.active_border "rgb(f38ba8)"

# Resize with hjkl (no modifiers needed)
binde = , h, resizeactive, -50 0
binde = , j, resizeactive, 0 50
binde = , k, resizeactive, 0 -50
binde = , l, resizeactive, 50 0

# Larger resize steps with Shift
binde = SHIFT, h, resizeactive, -100 0
binde = SHIFT, j, resizeactive, 0 100
binde = SHIFT, k, resizeactive, 0 -100
binde = SHIFT, l, resizeactive, 100 0

# Exit resize mode and restore border color
bind = , escape, exec, hyprctl keyword general:col.active_border "rgb(89b4fa)"
bind = , escape, submap, reset
bind = , return, exec, hyprctl keyword general:col.active_border "rgb(89b4fa)"
bind = , return, submap, reset
bind = $mod, r, exec, hyprctl keyword general:col.active_border "rgb(89b4fa)"
bind = $mod, r, submap, reset

# Reset to default submap
submap = reset
