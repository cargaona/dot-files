# General Hyprland Settings
# Layout, gaps, borders, and core window manager behavior

general {
    # Master layout (tile mode)
    layout = master

    # Gaps between windows (inner) and edges (outer)
    gaps_in = 5
    gaps_out = 10

    # Border settings
    border_size = 2
    col.active_border = rgb(89b4fa)
    col.inactive_border = rgb(313244)

    # Focus behavior
    allow_tearing = false
    resize_on_border = true
}

# Master layout specific settings
master {
    # New window placement: slave (below master) or master
    new_status = slave

    # Orientation of the master area
    orientation = left

    # Percentage of screen the master takes (0-100)
    mfact = 0.6
}

# Dwindle layout specific settings
dwindle {
    # Maintain window sizes when moving between splits
    pseudotile = false
    
    # Keep split direction when moving windows
    preserve_split = true
    
    # Auto-split based on window dimensions
    smart_split = false
    
    # Smart window resizing
    smart_resizing = true
}

# Scrolling layout specific settings
scrolling {
    # Default column width [0.1 - 1.0]
    column_width = 0.5
    
    # Single column spans entire screen
    fullscreen_on_one_column = true
    
    # How to bring focused column into view: 0 = center, 1 = fit
    focus_fit_method = 0
    
    # Auto-scroll to focused window
    follow_focus = true
    
    # Min fraction visible for focus to follow [0.0 - 1.0]
    follow_min_visible = 0.4
    
    # Direction of new windows and scrolling
    direction = right
    
    # Preconfigured widths for colresize +conf/-conf
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
}

# TODO: When Hyprland v0.55.0 is available, add per-workspace layout rules:
# Per-workspace layouts were added in PR #12890 "Rethonk layouts from the ground up"
# Syntax: workspace = 1, layout:scrolling
#         workspace = 2, layout:master
#         workspace = 3, layout:dwindle
# See: https://github.com/hyprwm/Hyprland/pull/12890

# XWayland
xwayland {
    force_zero_scaling = false
}
