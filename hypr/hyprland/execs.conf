# Startup Applications
# Commands to execute on Hyprland startup

# Wait for display setup before starting apps
exec-once = sleep 1

# XDG desktop portal (for file dialogs, screenshots, etc.)
exec-once = systemctl --user start xdg-desktop-portal
exec-once = systemctl --user start xdg-desktop-portal-gtk

# Clipboard manager
exec-once = wl-paste --watch cliphist store

# Idle/lock handler (hypridle with hyprlock)
exec-once = hypridle

# Wallpaper (hyprpaper)
exec-once = hyprpaper

# Input method
exec-once = ibus daemon --xim

# Authentication agent
exec-once = /nix/store/$(nix-store -q /run/current-system)/libexec/polkit-kde-authentication-agent-1 2>/dev/null || /usr/libexec/polkit-kde-authentication-agent-1 2>/dev/null || /usr/lib/polkit-kde-authentication-agent-1 2>/dev/null || echo "Polkit agent not found"

# Caelestia shell (if using standalone version)
# exec-once = caelestia

# Optional: Start favorite applications
# exec-once = alacritty
# exec-once = firefox
