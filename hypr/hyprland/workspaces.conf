# Workspace Configuration
# Workspaces 1-5 on HDMI-A-1 (ultrawide, primary)
# Workspaces 6-10 on DP-1 (vertical, secondary)

# Primary monitor (HDMI-A-1) - Workspaces 1-5
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# Secondary monitor (DP-1) - Workspaces 6-10
# orientation:top = windows stack vertically (one above the other), matching the physical portrait rotation
workspace = 6, monitor:DP-1, default:true, layoutopt:orientation:top, layoutopt:direction:down
workspace = 7, monitor:DP-1, layoutopt:orientation:top, layoutopt:direction:down
workspace = 8, monitor:DP-1, layoutopt:orientation:top, layoutopt:direction:down
workspace = 9, monitor:DP-1, layoutopt:orientation:top, layoutopt:direction:down
workspace = 10, monitor:DP-1, layoutopt:orientation:top, layoutopt:direction:down
