# Input Configuration
# Keyboard and mouse settings

input {
    kb_model = 
    kb_layout = us
    kb_variant = 
    kb_options = 
    kb_rules = 

    # Pointer speed and acceleration
    sensitivity = 0.5
    accel_profile = adaptive

    # Touchpad settings
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
    }
}

# Gestures (Hyprland 0.53+ syntax)
# 3-finger horizontal swipe to change workspace
gesture = 3, horizontal, workspace
