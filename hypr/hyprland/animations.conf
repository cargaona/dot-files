# Animation Settings
# Window and workspace transition animations

animations {
    enabled = true
    
    # Global animation curve
    bezier = easeOutQuint, 0.23, 1, 0.320, 1
    bezier = easeInOutCubic, 0.645, 0.045, 0.355, 1
    bezier = easeOutExpo, 0.19, 1, 0.220, 1
    bezier = linear, 0, 0, 1, 1

    # Window open/close animations
    animation = windows, 1, 3, easeOutQuint, slide
    animation = windowsIn, 1, 3, easeOutQuint, slide
    animation = windowsOut, 1, 3, easeOutQuint, slide
    animation = windowsMove, 1, 3, easeInOutCubic, slide

    # Fade animations
    animation = fade, 1, 2, easeInOutCubic
    animation = fadeIn, 1, 2, easeInOutCubic
    animation = fadeOut, 1, 2, easeInOutCubic
    animation = fadeSwitch, 1, 2, easeInOutCubic
    animation = fadeSwitchOut, 1, 2, easeInOutCubic

    # Workspace animations
    animation = workspaces, 1, 2, easeOutExpo, slide
    animation = specialWorkspace, 1, 2, easeOutExpo, slide

    # Border animations
    animation = borderangle, 1, 30, linear, loop
}
