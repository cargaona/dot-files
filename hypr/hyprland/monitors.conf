# Monitor Configuration
# Dual monitor setup with vertical left monitor and ultrawide right monitor

# DP-1: Vertical monitor (left)
# 1920x1080 resolution, vertical orientation (transform 1), positioned at 0x0
monitor = DP-1, 1920x1080, 0x0, 1, transform, 1

# HDMI-A-1: Ultrawide monitor (right, primary)
# 2560x1080 resolution, positioned at 1920x0 (right of vertical monitor)
monitor = HDMI-A-1, 2560x1080, 1920x0, 1

# Fallback for VGA (if using different monitor setup)
monitor = ,preferred,auto,1
