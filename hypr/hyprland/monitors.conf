# Monitor Configuration
# Dual monitor setup with vertical left monitor and ultrawide right monitor

# DP-1: Vertical monitor (left)
# Physical 1920x1080, rotated 90° (transform 1) → logical 1080x1920
# Positioned at origin (0,0)
monitor = DP-1, 1920x1080, 0x0, 1, transform, 1

# HDMI-A-1: Ultrawide monitor (right, primary)
# 2560x1080, positioned immediately right of DP-1 (x=1080)
# y=213 because physical DP-1 is ~3cm higher than HDMI-A-1 top
monitor = HDMI-A-1, 2560x1080, 1080x213, 1

# Fallback for any other monitors
monitor = ,preferred,auto,1
