# Main Hyprland Configuration Entry Point
# Modular setup with configs organized in hyprland/ subdirectory

# Environment variables
source = ~/.config/hypr/hyprland/env.conf

# Monitor and workspace setup
source = ~/.config/hypr/hyprland/monitors.conf
source = ~/.config/hypr/hyprland/workspaces.conf

# General settings
source = ~/.config/hypr/hyprland/general.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/decoration.conf
source = ~/.config/hypr/hyprland/animations.conf
source = ~/.config/hypr/hyprland/misc.conf

# Keybinds
source = ~/.config/hypr/hyprland/keybinds.conf

# Window rules
source = ~/.config/hypr/hyprland/rules.conf

# Startup applications
source = ~/.config/hypr/hyprland/execs.conf

# User overrides (optional, for personal customizations)
source = ~/.config/caelestia/hypr-user.conf
