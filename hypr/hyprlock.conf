# Hyprlock Configuration
# Lock screen appearance and behavior

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Background
background {
    monitor =
    path = ~/.config/hypr/wallpaper.png
    blur_passes = 3
    blur_size = 10
    vibrancy = 0.1696
}

# Input field
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 4
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(89b4fa)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fail_color = rgb(f38ba8)
    fail_text = <i>$ATTEMPTS</i>
    check_color = rgb(a6e3a1)
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgb(94e2d5)
    shadow_passes = 2
    shadow_boost = 1.2
}

# User label
label {
    monitor =
    text = Hi there, $USER
    color = rgb(cdd6f4)
    font_size = 25
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgb(cdd6f4)
    font_size = 95
    font_family = JetBrains Mono
    position = 0, -100
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = rgb(a6adc8)
    font_size = 20
    font_family = JetBrains Mono
    position = 0, -150
    halign = center
    valign = center
}
