# Hyprpaper Configuration
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprpaper/

# Preload wallpapers (loads them into memory)
# Replace with your actual wallpaper path from ~/docs/images/
preload = ~/docs/images/wallpaper.jpg

# Set wallpaper for all monitors
# Format: wallpaper = monitor,path
wallpaper = ,~/docs/images/wallpaper.jpg

# Disable splash text
splash = false

# Fully disable ipc
ipc = off
